      - name: copyapp
        method: POST
        description: Copy an app
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: apps-appid-export
      path: /apps/{appId}/export
      operations:
      - name: exportapp
        method: POST
        description: Export an app
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: apps-import
      path: /apps/import
      operations:
      - name: importapp
        method: POST
        description: Import an app
        inputParameters:
        - name: name
          in: query
          type: string
          description: The name of the target app.
        - name: spaceId
          in: query
          type: string
          description: The space identifier to import the app into. Uses personal space if omitted.
        - name: mode
          in: query
          type: string
          description: The import mode for the app.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: apps-appid-publish
