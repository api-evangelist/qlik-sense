meters:
  - name: subscription_users
    unit: seat
    aggregation: max
  - name: data_capacity
    unit: GB
    aggregation: max
principles:
  - name: Visibility
    description: Capacity and seat usage are observable in the Qlik Cloud Management Console; cost itself
      sits on the Qlik subscription invoice.
  - name: Allocation
    description: Allocate seats and capacity by space / business unit using Qlik's tenant and space
      governance.
  - name: Optimization
    description: Right-size capacity tier, retire unused users, and consolidate spaces; renegotiate
      capacity at renewal.
  - name: Accountability
    description: Spend is owned by the analytics / data platform team that holds the Qlik subscription.
