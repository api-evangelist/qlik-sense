  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Qlik Cloud Analytics
  ServiceCategory: Analytics
  ProviderName: Qlik
  PublisherName: QlikTech International AB
  InvoiceIssuerName: QlikTech International AB
