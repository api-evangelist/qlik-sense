description: FOCUS-aligned FinOps shape for Qlik Cloud Analytics — a tiered SaaS analytics subscription
  billed by capacity / users rather than metered API calls. Specific tier prices are not public.
notes: Qlik's public pricing surface does not expose plan-tier prices to anonymous fetch; the FinOps
  record keeps generic SaaS-subscription meters without inventing per-user rates.
sources:
  - https://www.qlik.com/us/pricing
