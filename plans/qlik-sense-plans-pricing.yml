specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Qlik Sense
providerId: qlik-sense
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Analytics
  - Business Intelligence
  - Data Visualization
description: Qlik Sense (now Qlik Cloud Analytics) is sold as a multi-tier SaaS analytics offering, but
  the public pricing page renders only as a navigation hub — concrete plan names, per-user prices, and
  capacity figures are gated behind contact-sales engagement.
notes: Qlik's public pricing pages return navigation content rather than plan tables to anonymous fetch;
  per-user-per-month prices and capacity figures are not published. Reconciliation reduced the scaffold
  to a single Contact Sales plan to avoid fabricating tier prices.
sources:
  - https://www.qlik.com/us/pricing
plans:
  - id: qlik-sense-contact-sales
    name: Contact Sales
    type: enterprise
    description: Qlik Cloud Analytics subscription. Plan tier (Standard / Premium / Enterprise), capacity
      (data + apps), and per-user price are quoted by Qlik sales.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: Qlik Cloud Analytics
      - name: Associative Engine
      - name: Data Connectors
      - name: Embedded and Custom Apps
      - name: Customer Success Manager
maintainers:
