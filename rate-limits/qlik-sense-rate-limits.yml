specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Qlik Sense
providerId: qlik-sense
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Analytics
  - Business Intelligence
  - Rate Limiting
description: Qlik Cloud Analytics exposes platform and management APIs to authenticated tenants; the
  pricing-page tier is gated and per-tier API rate-limit numbers are not published on the public marketing
  site. Authoritative limits live in qlik.dev and the tenant developer portal.
notes: Qlik pricing pages did not return plan tier or rate-limit numbers; reconciliation kept the rate-limit
  record as a pointer to the qlik.dev developer documentation rather than fabricating per-second values.
sources:
  - https://qlik.dev/
responseCodes:
  throttled: 429
limits:
  - name: Tenant API limits
    scope: tenant
    metric: varies
    limit: 'see qlik.dev API reference'
policies:
  - name: Tenant Scoping
    description: API throttling is applied per tenant; specific limits are documented in the qlik.dev
      developer reference and visible to authenticated tenant administrators.
  - name: Backoff
    description: Clients should honor 429 responses, back off, and retry with jitter; specific Retry-After
      semantics depend on the endpoint family.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
